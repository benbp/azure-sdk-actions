name: 'Azure SDK GitHub Event Handler'
description: 'Handle GitHub event'
inputs:
  token:
    description: "GitHub Event Token"
    required: true
runs:
  using: "composite"
  steps:
    - run: |
        echo "Handle webhook event..."
        cd $env:GITHUB_ACTION_PATH
        cd pwsh
        echo "$($env:GITHUB_PAYLOAD)" > ./github_payload.json
        ./main.ps1 ./github_payload.json
      shell: pwsh
      env:
        GITHUB_PAYLOAD: ${{ toJson(github.event) }}
        GITHUB_TOKEN: ${{ inputs.token }}
